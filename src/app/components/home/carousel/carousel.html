<div class="w-full overflow-hidden bg-neutral py-3">
  <div class="carousel-track flex w-max items-center">

    @for (skill of skillIcons.getAll(); track skill.id) {
      <div class="carousel-item px-10">
        <app-icon name="{{ skill.iconName }}" />
      </div>
    }

    @for (skill of skillIcons.getAll(); track 'copy-' + skill.id) {
      <div class="carousel-item px-10" aria-hidden="true">
        <app-icon name="{{ skill.iconName }}" />
      </div>
    }
  </div>
</div>
