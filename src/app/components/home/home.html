<div class="hero flex-1">
  <div class="hero-content flex-col w-full h-full justify-start min-w-full px-0 pb-0 pt-10">
    <div class="flex-1 flex items-center w-full justify-start">
      <div class="flex-auto lg:flex-1 ps-3 sm:ps-15 pe-4">
        <app-greeting />
      </div>

      <aside class="hidden lg:block lg:flex-1 h-full me-7">
        <app-profile-circle />
      </aside>
    </div>

    <div class="w-full bg-neutral py-1">
      <om-marquee [animationDuration]="'80s'" [marqueeGap]="'6rem'" [pauseOnHover]="false">
        @for (skill of skillIcons.getAll(); track skill.id) {
        <ng-template [omMarqueeItem]="'card'">
          <p>
            <app-icon name="{{ skill.iconName }}" />
          </p>
        </ng-template>
        }
      </om-marquee>
    </div>
  </div>
</div>
